# MiniMind 内置训练默认配置
# 每个 section 对应一种任务类型，可通过 --config my.yaml 叠加覆盖

# ===========================================================================
# 预训练
# ===========================================================================
pretrain:
  task: pretrain
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 340
  data_path:
    - ./dataset/pretrain_t2t_mini.jsonl
  from_weight: "none"
  save_weight: pretrain
  batch_size: 32
  learning_rate: 5.0e-4
  epochs: 2
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  log_interval: 100
  save_interval: 100
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  tokenizer_path: ./model
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-Pretrain

# ===========================================================================
# SFT 全量微调
# ===========================================================================
full_sft:
  task: full_sft
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 768
  data_path:
    - ./dataset/sft_t2t_mini.jsonl
  from_weight: pretrain
  save_weight: full_sft
  batch_size: 32
  learning_rate: 1.0e-5
  epochs: 3
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  log_interval: 100
  save_interval: 100
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  tokenizer_path: ./model
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-SFT

# ===========================================================================
# LoRA 微调
# ===========================================================================
lora:
  task: lora
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 340
  data_path:
    - ./dataset/lora_medical.jsonl
  from_weight: full_sft
  lora_name: lora_medical
  save_weight: lora_medical
  batch_size: 32
  learning_rate: 1.0e-4
  epochs: 10
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  log_interval: 10
  save_interval: 1000
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-LoRA

# ===========================================================================
# 知识蒸馏
# ===========================================================================
distillation:
  task: distillation
  student_hidden_size: 768
  student_num_layers: 8
  teacher_hidden_size: 768
  teacher_num_layers: 8
  student_use_moe: false
  teacher_use_moe: true
  max_seq_len: 340
  data_path:
    - ./dataset/sft_t2t_mini.jsonl
  from_student_weight: full_sft
  from_teacher_weight: full_sft
  save_weight: full_dist
  batch_size: 32
  learning_rate: 5.0e-6
  epochs: 6
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  alpha: 0.5
  temperature: 1.5
  log_interval: 100
  save_interval: 100
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-Distillation

# ===========================================================================
# DPO
# ===========================================================================
dpo:
  task: dpo
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 1024
  data_path:
    - ./dataset/dpo.jsonl
  from_weight: full_sft
  save_weight: dpo
  batch_size: 4
  learning_rate: 4.0e-8
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  beta: 0.15
  log_interval: 100
  save_interval: 100
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-DPO

# ===========================================================================
# GRPO
# ===========================================================================
grpo:
  task: grpo
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 768
  max_gen_len: 1024
  data_path:
    - ./dataset/rlaif.jsonl
  from_weight: full_sft
  save_weight: grpo
  batch_size: 2
  learning_rate: 3.0e-7
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  num_generations: 6
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.9
  rollout_engine: torch
  sglang_base_url: "http://localhost:8998"
  sglang_model_path: "../model"
  sglang_shared_path: "./sglang_ckpt_grpo"
  reward_model_path: "../../internlm2-1_8b-reward"
  log_interval: 1
  save_interval: 10
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-GRPO

# ===========================================================================
# PPO
# ===========================================================================
ppo:
  task: ppo
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 768
  max_gen_len: 1024
  data_path:
    - ./dataset/rlaif.jsonl
  from_weight: full_sft
  save_weight: ppo
  batch_size: 2
  learning_rate: 3.0e-7
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  num_generations: 6
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.9
  rollout_engine: torch
  sglang_base_url: "http://localhost:8998"
  sglang_model_path: "../model"
  sglang_shared_path: "./sglang_ckpt_ppo"
  reward_model_path: "../../internlm2-1_8b-reward"
  log_interval: 1
  save_interval: 10
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-PPO

# ===========================================================================
# Agent RL
# ===========================================================================
agent:
  task: agent
  hidden_size: 768
  num_hidden_layers: 8
  use_moe: false
  max_seq_len: 1024
  max_gen_len: 768
  max_total_len: 2500
  data_path:
    - ./dataset/agent_rl.jsonl
  from_weight: full_sft
  save_weight: agent
  batch_size: 2
  learning_rate: 3.0e-7
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  dtype: bfloat16
  num_workers: 8
  num_generations: 4
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.1
  rollout_engine: torch
  sglang_base_url: "http://localhost:8998"
  sglang_model_path: "../model"
  sglang_shared_path: "./sglang_ckpt_agent"
  reward_model_path: "../../internlm2-1_8b-reward"
  log_interval: 1
  save_interval: 10
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  checkpoint_max_keep: 3
  checkpoint_format: torch
  use_wandb: false
  wandb_project: MiniMind-Agent-RL
