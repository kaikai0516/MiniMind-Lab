# =============================================================================
#  MiniMind 统一训练配置
#
#  使用方法:
#    1. 运行智能配置工具生成推荐配置:
#       python scripts/auto_config.py --data_path <你的数据路径> --task <任务类型>
#
#    2. 或手动修改下方参数
#
#    3. 运行训练 (自动读取本文件):
#       python trainer/train_pretrain.py
#       python trainer/train_full_sft.py
#
#  配置优先级: config.yaml 默认值 → CLI 参数
# =============================================================================

# -- 全局默认 --
global:
  hidden_size: 768          # 隐藏层维度 (512/768)
  num_hidden_layers: 8      # Transformer 层数 (4/8)
  use_moe: false            # 是否启用 MoE
  max_seq_len: 768
  dtype: bfloat16
  num_workers: 8
  device: ""

# -- 路径 --
paths:
  data_dir: ./dataset
  save_dir: ./out
  checkpoint_dir: ./checkpoints
  tokenizer_path: ./model

# -- Checkpoint --
checkpoint:
  max_keep: 3
  format: torch
  save_interval: 100

# -- 日志与监控 --
logging:
  log_interval: 100
  use_wandb: false
  wandb_project: MiniMind-Lab
  metrics_csv: ./metrics.csv

# =============================================================================
# 下方按任务类型配置。运行 auto_config.py 会自动填充最优参数。
# =============================================================================

# -- 第1步: 预训练 --
pretrain:
  data_path:
    - dataset/pretrain_t2t_mini.jsonl   # <- 改为你的数据路径
  from_weight: "none"
  save_weight: pretrain
  batch_size: 32
  learning_rate: 0.0005
  epochs: 2
  accumulation_steps: 1
  grad_clip: 1.0

# -- 第2步: 全量 SFT --
full_sft:
  data_path:
    - dataset/sft_t2t_mini.jsonl        # <- 改为你的数据路径
  from_weight: pretrain
  save_weight: full_sft
  batch_size: 16
  learning_rate: 0.00001
  epochs: 2
  accumulation_steps: 1
  grad_clip: 1.0

# -- 第3步: LoRA (可选) --
lora:
  data_path:
    - dataset/lora_medical.jsonl
  from_weight: full_sft
  lora_name: lora_weights
  save_weight: lora_weights
  batch_size: 32
  learning_rate: 0.0001
  epochs: 10
  accumulation_steps: 1
  grad_clip: 1.0

# -- 第4步: 蒸馏 (可选) --
distillation:
  data_path:
    - dataset/sft_t2t_mini.jsonl
  from_student_weight: full_sft
  from_teacher_weight: full_sft
  save_weight: full_dist
  batch_size: 32
  learning_rate: 0.000005
  epochs: 6
  accumulation_steps: 1
  grad_clip: 1.0
  alpha: 0.5
  temperature: 1.5

# -- 第5步: DPO (可选) --
dpo:
  data_path:
    - dataset/dpo.jsonl
  from_weight: full_sft
  save_weight: dpo
  batch_size: 4
  learning_rate: 0.00000004
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  beta: 0.15

# -- 第6步: GRPO (可选) --
grpo:
  data_path:
    - dataset/rlaif.jsonl
  from_weight: full_sft
  save_weight: grpo
  batch_size: 2
  learning_rate: 0.0000003
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  max_gen_len: 1024
  num_generations: 6
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.9

# -- 第7步: PPO (可选) --
ppo:
  data_path:
    - dataset/rlaif.jsonl
  from_weight: full_sft
  save_weight: ppo
  batch_size: 2
  learning_rate: 0.0000003
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  max_gen_len: 1024
  num_generations: 6
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.9

# -- 第8步: Agent RL (可选) --
agent:
  data_path:
    - dataset/agent_rl.jsonl
  from_weight: full_sft
  save_weight: agent
  batch_size: 2
  learning_rate: 0.0000003
  epochs: 1
  accumulation_steps: 1
  grad_clip: 1.0
  max_gen_len: 768
  max_total_len: 2500
  num_generations: 4
  beta: 0.1
  loss_type: cispo
  epsilon: 0.2
  epsilon_high: 5.0
  thinking_ratio: 0.1

# -- Rollout Engine --
rollout:
  engine: torch
  sglang_base_url: "http://localhost:8998"
  sglang_model_path: "../model"
  sglang_shared_path: "./sglang_ckpt"
  reward_model_path: "../../internlm2-1_8b-reward"

# -- 高级选项 --
advanced:
  use_compile: false
  debug_mode: false
  debug_interval: 20
  from_resume: false
